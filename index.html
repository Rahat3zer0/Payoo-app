<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payoo Login</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex items-center justify-center bg-gray-300">

  <div class="w-[320px] h-[600px] relative">

    <!-- Top Section -->
    <div class="relative w-full h-[220px]">

      <!-- Background Circle -->
      <img src="assets/bg.png"
        class="absolute top-0 left-1/2 -translate-x-1/2 w-[260px]" />

      <!-- Logo -->
      <img src="assets/Group.png"
        class="absolute top-[42%] left-1/2 -translate-x-1/2 -translate-y-1/2 w-[55px] z-10" />
    </div>

    <!-- Card -->
    <div class="absolute top-[150px] w-full bg-gray-100 p-6 rounded-2xl shadow-lg">

      <!-- ✅ FORM START -->
      <form id="loginForm">

        <!-- Mobile -->
        <label class="text-sm text-gray-700 block mb-1">
          Mobile Number
        </label>
        <input id="mobileNumber" type="text"
          placeholder="Enter your number"
          class="w-full p-3 rounded-full bg-gray-200 outline-none mb-4" />

        <!-- PIN -->
        <label class="text-sm text-gray-700 block mb-1">
          4 Digit Pin
        </label>
        <input id="pinCode" type="password"
          placeholder="Enter 4 Digit Pin"
          class="w-full p-3 rounded-full bg-gray-200 outline-none mb-4" />

        <!-- Button -->
        <button type="submit"
          class="w-full p-3 rounded-full bg-gradient-to-r from-blue-500 to-blue-700 text-white text-lg hover:opacity-90 transition">
          Login
        </button>

      </form>
      <!-- ✅ FORM END -->

    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
