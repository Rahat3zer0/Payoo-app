<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cash Out</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 flex justify-center py-4">

  <div class="w-full max-w-sm min-h-screen bg-[#f5f5f5] rounded-2xl overflow-hidden">

    <!-- 🔵 Top -->
    <div class="px-4 pt-5 pb-4 border-b border-gray-200">

      <div class="flex justify-between items-center">

        <div class="flex items-center gap-2">
          <img src="assets/Group.png"
     class="w-8 cursor-pointer hover:scale-110 transition"
     onclick="window.location.href='dashboard.html'">
          <div>
            <!-- 🔥 IMPORTANT ID -->
            <h2 id="balance" class="font-bold text-lg">$45000</h2>
            <p class="text-xs text-gray-400">Available Balance</p>
          </div>
        </div>

        <button onclick="window.location.href='index.html'"
          class="flex items-center gap-1 text-xs border px-3 py-1 rounded-lg bg-white shadow-sm">
          <img src="assets/logout.png" class="w-8">
          Log Out
        </button>

      </div>

      <div class="mt-4">
        <h2 class="font-semibold text-lg mb-1">🔥 Welcome to Payooo!</h2>
        <p class="text-sm text-gray-400 leading-5">
          Enjoy easy and convenient financial services with us.
          Cashout charge is low and secure.
        </p>
      </div>

    </div>

    <!-- 🔘 Actions -->
    <div class="mx-4 mt-4 p-4 bg-white rounded-3xl shadow-sm border border-gray-200">

      <div class="grid grid-cols-3 gap-3">

        <div onclick="window.location.href='addmoney.html'"
          class="p-3 rounded-xl border text-center cursor-pointer">
          <img src="assets/wallet1.png" class="mx-auto w-8 mb-1">
          <p class="text-xs">Add Money</p>
        </div>

       <!-- Cashout (ACTIVE) -->
<div class="p-3 rounded-xl border-2 border-blue-500 bg-blue-50 text-center">
  <img src="assets/send1.png" class="mx-auto w-8 mb-1">
  <p class="text-xs text-blue-600 font-medium">Cashout</p>
</div>

<!-- Transfer (normal) -->
<div onclick="window.location.href='transfer.html'"
  class="p-3 rounded-xl border text-center cursor-pointer">
  <img src="assets/money1.png" class="mx-auto w-8 mb-1">
  <p class="text-xs">Transfer Money</p>
</div>

 <div onclick="window.location.href='getbonus.html'"
     class="p-3 rounded-xl border text-center cursor-pointer">
  <img src="assets/bonus1.png" class="mx-auto w-8 mb-1">
  <p class="text-xs">Get Bonus</p>
</div>
<div onclick="window.location.href='paybill.html'"
     class="p-3 rounded-xl border text-center cursor-pointer">
  <img src="assets/purse1.png" class="mx-auto w-8 mb-1">
  <p class="text-xs">Pay Bill</p>
</div>

<div onclick="window.location.href='dashboard.html'"
     class="p-3 rounded-xl border text-center cursor-pointer">
  <img src="assets/transaction1.png" class="mx-auto w-8 mb-1">
  <p class="text-xs">Transactions</p>
</div>

      </div>

    </div>

    <!-- 💸 Cashout Form -->
    <div class="px-4 mt-5">

      <h3 class="font-semibold text-sm mb-3 text-gray-700">Cash Out</h3>

     <form id="cashoutForm" class="bg-gray-100 p-4 pb-6 rounded-3xl">

        <label class="text-xs text-gray-600 mb-1 block">Agent Number</label>
        <input type="text"
          placeholder="Enter 11 digit number"
          class="w-full px-4 py-3 rounded-full bg-gray-200 text-gray-400 text-sm mb-4 outline-none">

        <label class="text-xs text-gray-600 mb-1 block">Amount</label>
        <input id="amountInput" type="number"
          placeholder="Enter amount to withdraw"
          class="w-full px-4 py-3 rounded-full bg-gray-200 text-gray-400 text-sm mb-4 outline-none">

        <label class="text-xs text-gray-600 mb-1 block">Pin Number</label>
        <input id="pinInput" type="password"
          placeholder="Enter 4 digit pin number"
          class="w-full px-4 py-3 rounded-full bg-gray-200 text-gray-400 text-sm mb-5 outline-none">

        <button id="withdrawBtn" type="submit"
  class="w-full py-3 rounded-full bg-blue-600 text-white font-medium text-sm">
  Withdraw Money
</button>

      </form>

    </div>

  </div>

<script src="js/cashout.js"></script>

</body>
</html>
